# Prometheus scrape config — pulls /metrics from each body service by compose service name.
global:
  scrape_interval: 10s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:8000"]
  - job_name: poller
    static_configs:
      - targets: ["poller:9101"]
  - job_name: processor
    static_configs:
      - targets: ["processor:9102"]
