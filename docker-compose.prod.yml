# docker-compose.prod.yml — production OVERRIDE for the droplet (Phase J).
#
# The base docker-compose.yml already defines the whole stack (postgres, redis, api,
# poller, processor, tiles, prometheus, grafana). This file layers prod-only settings on
# top. Bring the stack up on the droplet with BOTH files:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Secrets come from a `.env` on the droplet (see .env.prod.example). HTTPS is handled by
# Cloudflare Tunnel (cloudflared service below) so no ports need to be opened to the
# internet and no TLS certs are managed by hand.
services:
  api:
    environment:
      # Lock CORS to the exact Cloudflare Pages origin in prod (base default is "*").
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS}

  grafana:
    environment:
      # Real admin password in prod (base uses "admin"). Anonymous Viewer stays on so the
      # README's public dashboard link works without login.
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}

  # Cloudflare Tunnel: exposes the droplet's API (and tiles) over Cloudflare's HTTPS edge
  # without opening any inbound ports. The token comes from the Cloudflare Zero Trust
  # dashboard when you create the tunnel (set at the droplet step).
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: lt-cloudflared
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - api
    restart: unless-stopped
