# docker-compose.yml — local dev stack for LiveTransit Copilot (Phase 0)
#
# Brings up two containers as one group:
#   - postgres : PostgreSQL 16 with PostGIS baked in (our spatial database)
#   - redis    : Redis 7 (cache + streaming queue, used more from Phase 2 on)
#
# Secrets live in .env (git-ignored); this file holds only placeholders, so it is
# safe to commit. Start with:  docker compose up -d
services:
  postgres:
    # TimescaleDB-HA bundles TimescaleDB + PostGIS + pgvector (needed in Phases 5 and D).
    image: timescale/timescaledb-ha:pg17
    container_name: lt-postgres
    environment:                            # honors the standard postgres env vars
      POSTGRES_USER: ${POSTGRES_USER}       # filled from .env
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"                         # host:container
    volumes:
      - pgdata:/home/postgres/pgdata/data   # this image's PGDATA path
    healthcheck:                            # report "ready" only once it accepts connections
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: lt-redis
    ports:
      - "6379:6379"                         # host:container
    volumes:
      - redisdata:/data                     # persist Redis data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    container_name: lt-api
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    environment:
      # NOTE: host is "postgres"/"redis" (service names), not localhost —
      # containers reach each other by service name on the compose network.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/app/frontend:ro      # serve the live-map page (no rebuild on edits)
      - ./models:/app/models:ro          # trained ETA model (loaded at startup)
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  poller:
    build: .
    container_name: lt-poller
    command: python -m backend.app.ingest.poller
    environment:
      # The poller now only PUBLISHES to Redis (no DB access).
      REDIS_URL: redis://redis:6379/0
      MBTA_VEHICLE_POSITIONS_URL: https://cdn.mbta.com/realtime/VehiclePositions.pb
      POLL_INTERVAL_SECONDS: "10"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  tiles:
    image: ghcr.io/maplibre/martin:latest
    container_name: lt-tiles
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  processor:
    build: .
    container_name: lt-processor
    command: python -m backend.app.ingest.processor
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:                                    # named volumes managed by Docker
  pgdata:
  redisdata:
