<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LiveTransit — Boston</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    html, body { margin: 0; height: 100%; }
    #map { position: absolute; inset: 0; }
    #status {
      position: absolute; top: 10px; left: 10px; z-index: 1;
      background: rgba(0,0,0,0.75); color: #fff; padding: 8px 12px;
      border-radius: 6px; font: 14px system-ui, sans-serif;
    }
    #status .dot { color: #f33; }
    #status.ok .dot { color: #3f3; }
    #panel {
      position: absolute; top: 10px; right: 10px; z-index: 2; width: 290px;
      max-height: 82vh; overflow: auto; background: #fff; border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,.35); font: 13px system-ui, sans-serif; display: none;
    }
    #panel header {
      padding: 10px 12px; background: #1a1a2e; color: #fff; border-radius: 8px 8px 0 0;
      font-weight: 600; display: flex; justify-content: space-between; align-items: center;
    }
    #panel .close { cursor: pointer; opacity: .8; }
    #panel .row {
      padding: 8px 12px; border-bottom: 1px solid #eee;
      display: flex; justify-content: space-between; align-items: center;
    }
    #panel .route { font-weight: 700; }
    #panel .eta { text-align: right; line-height: 1.35; }
    #panel .late { color: #c0392b; } #panel .early { color: #2980b9; }
    #panel footer { padding: 8px 12px; color: #555; font-size: 11px; background: #f7f7f7;
      border-radius: 0 0 8px 8px; }
    #chat {
      position: absolute; bottom: 14px; left: 14px; z-index: 3; width: 340px;
      background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.35);
      font: 13px system-ui, sans-serif; overflow: hidden;
    }
    #chat header { background: #1a1a2e; color: #fff; padding: 8px 12px; font-weight: 600; }
    #chatlog { max-height: 300px; overflow: auto; padding: 8px 12px; }
    #chatlog .step { color: #777; font-style: italic; margin: 2px 0; }
    #chatlog .you { font-weight: 600; margin-top: 8px; }
    #chatlog .card { background: #f4f6fb; border-left: 3px solid #1a73e8;
      padding: 6px 8px; margin: 6px 0; border-radius: 4px; }
    #chat input { width: 100%; border: 0; border-top: 1px solid #eee; padding: 10px 12px;
      font-size: 13px; box-sizing: border-box; outline: none; }
  </style>
</head>
<body>
  <div id="status"><span class="dot">●</span> connecting…</div>
  <div id="panel"></div>
  <div id="chat">
    <header>🤖 Copilot</header>
    <div id="chatlog"><div class="step">Ask about routes, arrivals, or alerts…</div></div>
    <input id="chatinput" placeholder="e.g. Where are the Red Line trains?" autocomplete="off" />
  </div>
  <div id="map"></div>
  <script>
    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://demotiles.maplibre.org/style.json',  // free basemap, no API key
      center: [-71.0589, 42.3601],                          // Boston
      zoom: 11,
    });

    const EMPTY = { type: 'FeatureCollection', features: [] };

    map.on('load', () => {
      // --- Real MBTA network from Martin vector tiles (drawn BENEATH the dots) ---
      const TILES = 'http://localhost:3000';   // Martin tile server (local dev)

      map.addSource('routes', { type: 'vector', url: `${TILES}/route_shapes` });
      map.addLayer({
        id: 'routes', type: 'line', source: 'routes', 'source-layer': 'route_shapes',
        paint: { 'line-color': ['get', 'route_color'], 'line-width': 2, 'line-opacity': 0.85 },
      });

      map.addSource('stops', { type: 'vector', url: `${TILES}/stops` });
      map.addLayer({
        id: 'stops', type: 'circle', source: 'stops', 'source-layer': 'stops', minzoom: 13,
        paint: {
          'circle-radius': 3, 'circle-color': '#ffffff',
          'circle-stroke-color': '#333333', 'circle-stroke-width': 1,
        },
      });
      map.on('click', 'stops', (e) => {
        const p = e.features[0].properties;
        showStop(p.stop_id, p.stop_name);
      });

      // --- Live vehicles (added last so the dots sit on top of the network) ---
      map.addSource('vehicles', { type: 'geojson', data: EMPTY });
      map.addLayer({
        id: 'vehicles',
        type: 'circle',
        source: 'vehicles',
        paint: {
          'circle-radius': 5,
          'circle-stroke-width': 1,
          'circle-stroke-color': '#ffffff',
          // Color the subway lines; everything else (bus/commuter rail) grey.
          'circle-color': [
            'match', ['get', 'route_id'],
            'Red', '#DA291C',
            'Orange', '#ED8B00',
            'Blue', '#003DA5',
            'Green-B', '#00843D', 'Green-C', '#00843D',
            'Green-D', '#00843D', 'Green-E', '#00843D',
            '#888888',
          ],
        },
      });

      // Click a dot -> popup with route + vehicle id.
      map.on('click', 'vehicles', (e) => {
        const p = e.features[0].properties;
        new maplibregl.Popup()
          .setLngLat(e.lngLat)
          .setHTML(`<b>${p.route_id || '—'}</b><br>vehicle ${p.vehicle_id}`)
          .addTo(map);
      });
      map.on('mouseenter', 'vehicles', () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', 'vehicles', () => { map.getCanvas().style.cursor = ''; });

      connect();
    });

    const status = document.getElementById('status');
    const panel = document.getElementById('panel');

    // --- Copilot chat (streams tool steps + a structured answer over SSE) ---
    const chatlog = document.getElementById('chatlog');
    const chatinput = document.getElementById('chatinput');

    function logEl(html, cls) {
      const d = document.createElement('div');
      if (cls) d.className = cls;
      d.innerHTML = html;
      chatlog.appendChild(d);
      chatlog.scrollTop = chatlog.scrollHeight;
    }

    chatinput.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter' || !chatinput.value.trim()) return;
      const q = chatinput.value.trim();
      chatinput.value = '';
      chatinput.disabled = true;
      logEl('You: ' + q, 'you');
      const es = new EventSource('/agent/stream?q=' + encodeURIComponent(q));
      es.addEventListener('tool', (ev) => {
        logEl('🔧 calling ' + JSON.parse(ev.data).tool + '…', 'step');
      });
      es.addEventListener('result', (ev) => {
        const r = JSON.parse(ev.data);
        const a = r.answer;
        let html = '<b>' + (a.summary || '') + '</b>';
        if (r.answer_type === 'ArrivalAnswer' && a.arrivals) {
          html += '<br>' + a.arrivals.map((x) => `${x.route} — ${x.status}`).join('<br>');
        } else if (a.facts && a.facts.length) {
          html += '<br>' + a.facts.map((f) => '• ' + f).join('<br>');
        }
        logEl(html, 'card');
        es.close();
        chatinput.disabled = false;
        chatinput.focus();
      });
      es.onerror = () => { es.close(); chatinput.disabled = false; };
    });

    function fmtTime(iso) {
      return new Date(iso).toLocaleTimeString('en-US',
        { hour: '2-digit', minute: '2-digit', timeZone: 'America/New_York' });
    }

    function delayTag(d) {
      if (d == null) return '';
      const m = Math.max(1, Math.round(Math.abs(d) / 60));
      if (d > 30) return `<span class="late">${m}m late</span>`;
      if (d < -30) return `<span class="early">${m}m early</span>`;
      return 'on time';
    }

    async function showStop(stopId, stopName) {
      const head = `<header><span>${stopName || 'Stop'}</span>` +
        `<span class="close" onclick="panel.style.display='none'">&times;</span></header>`;
      panel.style.display = 'block';
      panel.innerHTML = head + '<div class="row">Loading predictions…</div>';
      try {
        const data = await (await fetch(`/stops/${encodeURIComponent(stopId)}/arrivals`)).json();
        const rows = data.arrivals.map((a) =>
          `<div class="row"><span class="route">${a.route_id}</span>` +
          `<span class="eta">${fmtTime(a.predicted_eta || a.scheduled)}<br>${delayTag(a.predicted_delay_s)}</span></div>`
        ).join('') || '<div class="row">No predicted arrivals right now.</div>';
        const acc = data.accuracy;
        panel.innerHTML = head + rows +
          `<footer>Predicted ETAs from a LightGBM model.<br>` +
          `MAE <b>${acc.mae_model_s}s</b> vs schedule baseline ${acc.mae_schedule_s}s.</footer>`;
      } catch (err) {
        panel.innerHTML = head + '<div class="row">Could not load predictions.</div>';
      }
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${proto}://${location.host}/ws/vehicles`);

      ws.onopen = () => { status.classList.add('ok'); };
      ws.onclose = () => {
        status.classList.remove('ok');
        status.innerHTML = '<span class="dot">●</span> disconnected — retrying…';
        setTimeout(connect, 2000);  // auto-reconnect
      };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        const features = msg.vehicles.map((v) => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [v.lon, v.lat] },
          properties: { vehicle_id: v.vehicle_id, route_id: v.route_id },
        }));
        map.getSource('vehicles').setData({ type: 'FeatureCollection', features });
        status.innerHTML = `<span class="dot">●</span> live — ${features.length} vehicles`;
      };
    }
  </script>
</body>
</html>
